<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Scolta Search</title>
  <link rel="stylesheet" href="../assets/css/scolta.css">
  <style>
    /* Minimal page wrapper — replace with your site's chrome. */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--scolta-bg, #f5f5f5);
      color: var(--scolta-text, #333);
      line-height: 1.5;
    }
    .page-header {
      background: var(--scolta-primary, #1a3a5c);
      color: white;
      padding: 1.5rem 2rem;
      text-align: center;
    }
    .page-header h1 { font-size: 1.6rem; font-weight: 400; margin-bottom: 0.3rem; }
    .page-header p { opacity: 0.8; font-size: 0.85rem; }
    .page-container {
      max-width: 960px;
      margin: 2rem auto;
      padding: 0 1rem;
    }
  </style>
</head>
<body>
  <div class="page-header">
    <h1>Search</h1>
    <p>Powered by Scolta</p>
  </div>

  <div class="page-container">
    <!-- Scolta mounts its UI inside this container. -->
    <div id="scolta-search"></div>
  </div>

  <script>
    // ==========================================================================
    // SCOLTA CONFIGURATION
    //
    // Set window.scolta BEFORE loading scolta.js. The search engine reads
    // all config from this object — no hardcoded values in the JS.
    // ==========================================================================
    window.scolta = {
      // Site identity
      siteName: 'My Site',

      // Path to Pagefind JS (relative to this page or absolute).
      pagefindPath: '/pagefind/pagefind.js',

      // API endpoints (your CMS provides these).
      endpoints: {
        expand: '/api/scolta/v1/expand-query',
        summarize: '/api/scolta/v1/summarize',
        followup: '/api/scolta/v1/followup',
      },

      // Scoring parameters — all optional, defaults match the original algorithm.
      scoring: {
        // Recency
        RECENCY_BOOST_MAX: 0.5,
        RECENCY_HALF_LIFE_DAYS: 365,
        RECENCY_PENALTY_AFTER_DAYS: 1825,
        RECENCY_MAX_PENALTY: 0.3,
        // Title/content
        TITLE_MATCH_BOOST: 1.0,
        TITLE_ALL_TERMS_MULTIPLIER: 1.5,
        CONTENT_MATCH_BOOST: 0.4,
        // Display
        EXCERPT_LENGTH: 300,
        RESULTS_PER_PAGE: 10,
        MAX_PAGEFIND_RESULTS: 50,
        // AI features
        AI_EXPAND_QUERY: true,
        AI_SUMMARIZE: true,
        AI_SUMMARY_TOP_N: 5,
        AI_SUMMARY_MAX_CHARS: 2000,
        EXPAND_PRIMARY_WEIGHT: 0.7,
        AI_MAX_FOLLOWUPS: 3,
      },

      // Domain allowlist for links in AI summaries.
      // Empty array = allow all links. Set to your domains to restrict.
      allowedLinkDomains: [],

      // Disclaimer text shown below AI summaries. Empty = none.
      disclaimer: 'AI-generated summary. May not be fully accurate.',
    };
  </script>
  <script type="module">
    import '../assets/js/scolta.js';
    Scolta.init('#scolta-search');
  </script>
</body>
</html>
