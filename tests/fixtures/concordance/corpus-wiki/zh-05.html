<h1>历史</h1>
<p><b>历史</b>是对过去的系统研究。作为一门学科，历史分析和解释证据，构建关于发生的事情的叙述并解释其发生的原因，主要关注人类历史。一些理论家将历史归类为社会科学，而另一些人则将其视为人文学科的一部分或认为它是一门混合学科。围绕历史的目的也存在类似的争论——例如，它的主要目的是理论性的（揭示真理），还是实践性的（从过去吸取教训）。在比较不同的意义上，“历史”一词不是单指学术领域，而是指过去本身或关于过去的个别文本。
</p>
