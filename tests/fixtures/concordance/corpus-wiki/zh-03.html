<h1>化學</h1>
<p><b>化學</b>是在原子、分子層次上研究物質的組成、結構、性質以及變化規律的科學。化學研究的對象涉及物質之間的相互關係，或物質和能量之間的關聯。傳統的化學常常都是關於兩種或以上的物質之間的接觸和其後的變化，即化學反應，又或者是一種物質變成另一種物質的過程。這些變化有時會需要使用電磁波，當中電磁波負責激發化學作用。不過有時化學並不一定要關於物質之間的反應。光譜學研究物質與光之間的關係，而這些關係並不涉及化學反應。准确的说，化学的研究范围是包括分子、电子、离子、原子、原子团在内的核-电子体系。
</p>
