<h1>物理学</h1>
<p><b>物理学</b><span class="rp">（</span>ぶつりがく、 とは、自然物や自然現象を観測することにより、それらの仕組み、性質、法則性などを明らかにしようとする学問である。物理学は、自然科学の一分野であり、古典的な研究分野は、物体の力学、光と色、音、電気と磁性、熱、波動、天体の諸現象 である。</p>
