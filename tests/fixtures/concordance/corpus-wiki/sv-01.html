<h1>Fysik</h1>
<p><b>Fysik</b> är vetenskapen om materia, dess minsta beståndsdelar, dess rörelse och beteende i rum och tid, samt om energi och kraft. Det är en av de mest grundläggande vetenskapliga disciplinerna. En forskare som specialiserar sig inom fysikområdet kallas fysiker.</p>
