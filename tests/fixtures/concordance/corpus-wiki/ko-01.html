<h1>물리학</h1>
<p><b>물리학</b>(<span>한국 한자: </span>物理學, <span>영어: </span>physics)은 물질과 그것의 시공간에서의 운동, 그리고 그것과 관련된 에너지나 힘 등을 연구하는 자연과학의 한 분야이다. 물리학은 가장 근본적인 과학 분야 중 하나이다. 물리학 분야를 전문으로 하는 과학자를 물리학자라고 부른다.</p>
