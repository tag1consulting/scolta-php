<h1>数学</h1>
<p><b>数学</b><span class="rp">（</span>すうがく、 とは、数・量・空間についての「抽象的な科学」であり、また構造や<span class="mw-disambig">変化</span>などを研究する学問であって、純粋数学と応用数学から成る。実験数学は統合的であり、計算的アプローチや応用数学 を使って純粋数学の研究を進めている。歴史上の実験数学的例は四色定理に、より古くはガウスやアルキメデスなどに見られる。</p>
