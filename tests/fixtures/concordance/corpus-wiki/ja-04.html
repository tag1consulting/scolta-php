<h1>地理学</h1>
<p><span><b>地理学</b></span> は、地球表面の自然・人文事象の状態と、それらの相互関係を研究する学問。地域や空間、場所、自然環境という物理的存在を対象の中に含むことから、人文科学、社会科学、自然科学のいずれの性格も併せ持ち広範な領域を網羅する学問である。また「地理学と哲学は諸科学の母」と称される。</p>
