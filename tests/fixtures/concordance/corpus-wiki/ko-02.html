<h1>수학</h1>
<p><b>수학</b>(數學, <span>영어: </span>mathematics, math, maths)은 수, 양, 구조, 공간, 변화 등의 개념을 연구하는 학문이다. 수학은 산술, 대수학, 기하학, 해석학과 같은 전통적인 분야에서부터 집합론과 수리논리학 등 현대 수학의 기초 분야에 이르기까지 다양한 영역으로 구성된다.</p>
