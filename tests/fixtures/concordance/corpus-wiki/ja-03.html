<h1>化学</h1>
<p><b>化学</b> とは、さまざまな物質の構造・性質および物質相互の反応を研究する、自然科学の一部門。物質が、何から、どのような構造で出来ているか、どんな特徴や性質を持っているか、そして相互作用や反応によってどのように、何に変化するか、を研究するとも言い換えられる。</p>
