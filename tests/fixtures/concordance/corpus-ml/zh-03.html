<h1>中国饮食文化</h1>
<p>中国饮食文化丰富多彩，各地菜系各有特色。川菜以麻辣著称，使用花椒和辣椒创造出独特的麻辣风味。粤菜注重食材的新鲜和原汁原味，清蒸和白灼是常见的烹饪方法。北京烤鸭是中国最具代表性的美食之一，皮脆肉嫩。饺子作为北方传统食物，在春节期间尤为重要，象征团圆和好运。中国茶文化源远流长，绿茶、红茶、乌龙茶等各有其独特的品茗文化。中餐的烹饪技巧包括炒、炖、蒸、烤等多种方法，体现了饮食艺术的精湛。</p>
