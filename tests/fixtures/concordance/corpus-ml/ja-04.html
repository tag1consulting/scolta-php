<h1>日本の自然と四季</h1>
<p>日本は南北に長い島国であり、地域によって大きく異なる気候と自然を持っています。春の桜は日本人にとって特別な存在であり、花見の文化は古くから根付いています。夏は祭りの季節であり、花火大会や盆踊りなど各地で様々な行事が開催されます。秋の紅葉は日本の風景に彩りを添え、京都や日光など各地の名所に多くの観光客が訪れます。冬は北海道で雪まつりが開催され、美しい雪像が観光客を魅了します。富士山は日本の象徴的な山であり、世界文化遺産にも登録されています。日本各地には温泉地があり、四季折々の自然を楽しみながら湯治を楽しむ文化があります。</p>
