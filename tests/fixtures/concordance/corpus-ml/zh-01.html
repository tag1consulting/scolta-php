<h1>中国传统文化概述</h1>
<p>中国传统文化博大精深，历史悠久。儒家思想强调仁义礼智信，是中国文化的核心价值观之一。道家追求自然和谐，主张无为而治的处世哲学。佛教自汉代传入中国后与本土文化融合，形成了独特的中国佛教流派。中国传统节日如春节、中秋节和端午节承载了丰富的文化内涵。诗词书画是中国传统艺术的精华，唐诗宋词至今仍被广泛传诵。中国传统医学强调阴阳平衡和整体观念，是世界医学宝库的重要组成部分。</p>
