<h1>中国的自然风光与地理</h1>
<p>中国地大物博，自然风光壮丽多样。长江是亚洲最长的河流，孕育了灿烂的中华文明。黄山以其奇松怪石云海温泉而闻名于世，是中国最美的山岳之一。西藏高原被誉为世界屋脊，拥有独特的高原生态系统和藏族文化。云南省生物多样性极为丰富，被誉为植物王国和动物王国。桂林山水以其独特的喀斯特地貌和漓江风光吸引了世界各地的游客。北京是中国的首都，拥有长城和颐和园等众多世界文化遗产。</p>
