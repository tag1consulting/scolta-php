<h1>Musique</h1>
<p>La <b>musique</b> est un art et une activité culturelle consistant à combiner sons et silences au cours du temps. Les paramètres principaux sont le rythme, la hauteur, les nuances et le timbre ainsi que la mélodie. Elle est aujourd'hui considérée comme une forme de poésie moderne.</p>
