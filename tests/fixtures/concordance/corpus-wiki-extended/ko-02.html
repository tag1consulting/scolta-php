<h1>철학</h1>
<p><b>철학</b>(哲學, <span>고대 그리스어: </span>φιλοσοφία)은 세상의 옳고 그름이 누구인지를 탐구,판별하는 것이다. 세계와 인간의 삶에 대한 근본 원리, 본질 등의 이해와 세계관을 토대로 한다. 또한 존재, 지식, 가치, 이성, 인식 그리고 언어, <span class="mw-disambig">논리</span>, 윤리 등의 대상의 실체를 연구하는 학문이다. 이 말은 프로타고라스에 의해서 만들어졌다고 한다.</p>
