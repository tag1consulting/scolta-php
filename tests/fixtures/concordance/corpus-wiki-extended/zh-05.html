<h1>科学</h1>
<p><b>科学</b> 是一個要求確實遵守其基本原則且立基於客觀事實的系統性研究領域，以可被檢驗的假說與預測為形式，進行知識的建構與組織工作。 科学强调预测结果的具体性、可证伪性；其他與科学對應的方法，有許多在更大程度上基於純粹且主觀的思考活動，而更少基於客觀事實。科学不在於寻求绝对无误的真理，而是在现有基础上，以科學方法不斷嘗試揭露和確認客觀世界的運作法則和原理等。
</p>
