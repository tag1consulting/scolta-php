<h1>哲学</h1>
<p><b>哲學</b>是研究普遍、基本问题的領域，包括存在、知识、价值、理智、心灵、语言、人生、道德等领域。哲学獨特之處在於其思考方式，例如批判性思维、系统化的方法，并以理性论证為基礎。縱觀历史，许多独立的学科如物理学、生物学等自然科学，或法学、政治学、心理学等社会科学，都曾被视作哲学的一部分或其分支。直到后续发展才逐漸被视作今日意义上的独立学科。
</p>
