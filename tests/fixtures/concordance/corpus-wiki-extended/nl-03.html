<h1>Muziek</h1>
<p><b>Muziek</b> of <b>toonkunst</b> is de kunstzinnige schikking en combinatie van de klanken van muziekinstrumenten en de menselijke stem om schoonheid van vorm dan wel uitdrukking van emotie te bereiken. Het woord 'muziek' is afgeleid van het Griekse <i>μουσική</i> (<i>mousikè</i>), 'kunst van de muzen'.</p>
