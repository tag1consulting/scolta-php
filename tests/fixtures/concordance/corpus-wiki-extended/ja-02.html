<h1>哲学</h1>
<p><b>哲学</b>（てつがく、英:Philosophy）は、一般的で基本的な問いを立てながらおこなう知的実践である。その厳密な定義については議論があるものの、一般的には、理性的な探究の一形態であること、体系的であることを目指すこと、そしてそれ自体の方法と仮定を批判的に考える傾向があるとされる。「哲学」という言葉自体は西周による西洋語由来の和製漢語であり、中国において用いられていた「希哲学」に淵源をたどることができる。また、その翻訳元となった英語「フィロソフィー」などは、古典ギリシア語で「知を愛する」といった意味を持つ「フィロソフィア」に由来する。</p>
