<h1>علم</h1>
<p><b>العِلْـمُ</b> ، أي «المعرفة»، هو أسلوب منهجي لبناء وتنظيم المعرفة في صورة تفسيرات وتوقعات قابلة للاختبار.<sup><small>(<span class="mw-selflink-fragment">1</span>)</small></sup><sup><small>(<span class="mw-selflink-fragment">2</span>)</small></sup> يرتكز مفهوم العلم على مصطلح المنهجية العلمية الذي بدوره يدرس البيانات ويضع فرضيات لتفسيرها ويختبرها وكل هذه العملية للوصول إلى معرفة قائمة على التجربة والتأكد من صحتها بدل التخمين.</p>
