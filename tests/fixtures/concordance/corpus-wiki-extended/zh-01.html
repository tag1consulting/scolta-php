<h1>文學</h1>
<p><b>文學</b>，在狭义上，是一种以語言和文字進行表達的藝術。亦即使用语言文字为手段，形象化地反映客观社会生活、表达主观作者思想感情的一种艺术。文学不仅强调传达思想观念，更强调传达方式的独特性，且讲究辞章的美感。
</p>
