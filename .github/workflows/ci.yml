name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php: ['8.1', '8.2', '8.3']
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: ffi
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-progress --prefer-dist

      - name: Lint
        run: composer lint
        continue-on-error: true

      - name: Run tests
        run: composer test

      - name: Verify WASM binary committed
        run: |
          if [ ! -f wasm/scolta_core.wasm ]; then
            echo "FAIL: wasm/scolta_core.wasm not found"
            echo "Build and commit: composer build-wasm"
            exit 1
          fi

  version-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'

      - name: Validate version format
        run: |
          VERSION=$(php -r "echo json_decode(file_get_contents('composer.json'))->version;")
          echo "Version: $VERSION"
          echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+(-[a-z]+)?$' || \
            (echo "FAIL: Invalid version format" && exit 1)
          echo "PASS"
