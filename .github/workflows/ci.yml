name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - php: '8.2'
            lint: false
          - php: '8.3'
            lint: true
    steps:
      - uses: actions/checkout@v4

      - name: Install Extism runtime
        run: |
          curl -s https://get.extism.org/cli | bash -s -- -y
          sudo extism lib install --version latest
          sudo ldconfig

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: ffi
          ini-values: ffi.enable=true
          coverage: none

      - name: Install dependencies
        run: composer update --no-interaction --prefer-dist --ignore-platform-req=php

      - name: Lint
        if: matrix.lint
        run: composer lint
        continue-on-error: true

      - name: Run tests
        run: composer test

      - name: Verify WASM binary committed
        run: |
          if [ ! -f wasm/scolta_core.wasm ]; then
            echo "FAIL: wasm/scolta_core.wasm not found"
            echo "Build and commit: composer build-wasm"
            exit 1
          fi

  docs-check:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check CHANGELOG.md updated when code changes
        run: |
          CODE_CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- \
            'src/' 'composer.json' 'tests/' 'wasm/' | head -1)
          if [ -n "$CODE_CHANGED" ]; then
            CHANGELOG_CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- CHANGELOG.md)
            if [ -z "$CHANGELOG_CHANGED" ]; then
              echo "FAIL: Code changed but CHANGELOG.md was not updated."
              echo "Please add an entry under ## [Unreleased] in CHANGELOG.md."
              exit 1
            fi
            echo "PASS: CHANGELOG.md updated alongside code changes."
          else
            echo "SKIP: No code changes detected."
          fi

      - name: Check CONFIG_REFERENCE.md freshness
        run: |
          CONFIG_CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- \
            'src/Config/ScoltaConfig.php' 'src/SetupCheck.php' | head -1)
          if [ -n "$CONFIG_CHANGED" ]; then
            DOCS_CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- \
              'docs/CONFIG_REFERENCE.md')
            if [ -z "$DOCS_CHANGED" ]; then
              echo "FAIL: ScoltaConfig or SetupCheck changed but docs/CONFIG_REFERENCE.md was not updated."
              echo "Please update the configuration reference to match the code."
              exit 1
            fi
            echo "PASS: CONFIG_REFERENCE.md updated alongside config changes."
          else
            echo "SKIP: No config changes detected."
          fi

  version-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'

      - name: Validate version format
        run: |
          VERSION=$(php -r "echo json_decode(file_get_contents('composer.json'))->version;")
          echo "Version: $VERSION"
          echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+(-[a-z]+)?$' || \
            (echo "FAIL: Invalid version format" && exit 1)
          echo "PASS"
