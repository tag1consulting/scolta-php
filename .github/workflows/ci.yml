name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - php: '8.2'
            lint: false
          - php: '8.3'
            lint: true
          - php: '8.4'
            lint: false
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: intl
          coverage: none

      - name: Install dependencies
        run: composer update --no-interaction --prefer-dist --ignore-platform-req=php

      - name: Lint
        if: matrix.lint
        run: composer lint

      - name: Run tests
        run: composer test

  coverage:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP with Xdebug
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: intl
          coverage: xdebug

      - name: Install dependencies
        run: composer update --no-interaction --prefer-dist

      - name: Run tests with coverage
        run: ./vendor/bin/phpunit --coverage-text --colors=never 2>&1 | tail -20

  wasm-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate WASM binary exists and is well-formed
        run: |
          WASM_PATH="assets/wasm/scolta_core_bg.wasm"
          JS_PATH="assets/wasm/scolta_core.js"

          echo "Checking WASM binary: $WASM_PATH"
          if [ ! -f "$WASM_PATH" ]; then
            echo "::error::WASM binary not found at $WASM_PATH"
            exit 1
          fi

          WASM_SIZE=$(stat -c%s "$WASM_PATH")
          echo "WASM size: ${WASM_SIZE} bytes"
          if [ "$WASM_SIZE" -lt 102400 ] || [ "$WASM_SIZE" -gt 5242880 ]; then
            echo "::error::WASM binary size ${WASM_SIZE} bytes is outside expected range (100KB–5MB)"
            exit 1
          fi

          # Verify WebAssembly magic number: \0asm (0x00 0x61 0x73 0x6D)
          MAGIC=$(xxd -l 4 -p "$WASM_PATH")
          if [ "$MAGIC" != "0061736d" ]; then
            echo "::error::WASM binary has invalid magic bytes: $MAGIC (expected 0061736d)"
            exit 1
          fi
          echo "WASM magic bytes: OK ($MAGIC)"

          echo "Checking JS loader: $JS_PATH"
          if [ ! -f "$JS_PATH" ]; then
            echo "::error::WASM JS loader not found at $JS_PATH"
            exit 1
          fi

          # JS loader must reference the WASM file
          if ! grep -q "scolta_core_bg.wasm" "$JS_PATH"; then
            echo "::error::JS loader does not reference scolta_core_bg.wasm"
            exit 1
          fi
          echo "JS loader references: OK"

          echo "PASS: WASM binary validation complete."

      - name: Setup Node.js for WASM runtime check
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate WASM loads in Node.js
        run: |
          node -e "
            const fs = require('fs');
            const wasmPath = 'assets/wasm/scolta_core_bg.wasm';
            if (!fs.existsSync(wasmPath)) {
              console.error('WASM file not found');
              process.exit(1);
            }
            const buf = fs.readFileSync(wasmPath);
            WebAssembly.compile(buf).then(() => {
              console.log('PASS: WASM compiles successfully in Node.js');
            }).catch(e => {
              console.error('FAIL: WASM failed to compile:', e.message);
              process.exit(1);
            });
          "

  js-tests:
    name: JS tests (Jest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install JS dependencies
        working-directory: tests/js
        run: npm ci

      - name: Run Jest tests
        working-directory: tests/js
        run: npm test

  docs-check:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check CHANGELOG.md updated when code changes
        run: |
          CODE_CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- \
            'src/' 'composer.json' 'tests/' | head -1)
          if [ -n "$CODE_CHANGED" ]; then
            CHANGELOG_CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- CHANGELOG.md)
            if [ -z "$CHANGELOG_CHANGED" ]; then
              echo "FAIL: Code changed but CHANGELOG.md was not updated."
              echo "Please add an entry under ## [Unreleased] in CHANGELOG.md."
              exit 1
            fi
            echo "PASS: CHANGELOG.md updated alongside code changes."
          else
            echo "SKIP: No code changes detected."
          fi

      - name: Check CONFIG_REFERENCE.md freshness
        run: |
          CONFIG_CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- \
            'src/Config/ScoltaConfig.php' 'src/SetupCheck.php' | head -1)
          if [ -n "$CONFIG_CHANGED" ]; then
            DOCS_CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- \
              'docs/CONFIG_REFERENCE.md')
            if [ -z "$DOCS_CHANGED" ]; then
              echo "FAIL: ScoltaConfig or SetupCheck changed but docs/CONFIG_REFERENCE.md was not updated."
              echo "Please update the configuration reference to match the code."
              exit 1
            fi
            echo "PASS: CONFIG_REFERENCE.md updated alongside config changes."
          else
            echo "SKIP: No config changes detected."
          fi

  version-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'

      - name: Validate version format
        run: |
          VERSION=$(php -r "echo json_decode(file_get_contents('composer.json'))->version;")
          echo "Version: $VERSION"
          echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+(-[a-z]+)?$' || \
            (echo "FAIL: Invalid version format" && exit 1)
          echo "PASS"

  fixture-freshness:
    name: Concordance fixture version check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check fixture version matches BUNDLED_VERSION
        run: |
          BUNDLED=$(grep "BUNDLED_VERSION" src/Index/SupportedVersions.php \
            | grep -oE "'[0-9]+\.[0-9]+\.[0-9]+'" | tr -d "'")
          FIXTURE=$(cat tests/fixtures/concordance/reference/pagefind-entry.json \
            | grep -oE '"version":"[^"]+"' | head -1 | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          echo "BUNDLED_VERSION: $BUNDLED"
          echo "Fixture version: $FIXTURE"
          if [ "$BUNDLED" != "$FIXTURE" ]; then
            echo "::error::BUNDLED_VERSION ($BUNDLED) does not match fixture version ($FIXTURE)"
            echo "Run: ./scripts/generate-concordance-fixtures.sh $BUNDLED"
            exit 1
          fi
          echo "PASS: Versions match."
